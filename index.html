<!DOCTYPE html>
<html lang="en" style="background: rgba(255, 255, 255, 0.1);">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>
    <style>
        * {
            margin: 0;
            padding: 0;
            border: 0;
        }

        html {
            background: rgba(255, 255, 255, 0.1) !important;
            background-color: rgba(255, 255, 255, 0.1) !important;
        }

        body {
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.1) !important;
            background-color: rgba(255, 255, 255, 0.1) !important;
            overflow: hidden;
            font-family: 'Roboto', sans-serif;
        }

        /* Tavron-styled button only */
        .special-offer-button {
            position: fixed;
            bottom: 300px;
            left: 50%;
            transform: translateX(-50%);
            padding: 16px 45px;
            background: linear-gradient(135deg, #28a745 0%, #1e7e34 100%);
            color: white;
            font-size: 18px;
            font-weight: 700;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            z-index: 999;
            box-shadow: 0 6px 20px rgba(40, 167, 69, 0.4);
            transition: all 0.3s ease;
            letter-spacing: 0.5px;
        }

        .special-offer-button:hover {
            background: linear-gradient(135deg, #218838 0%, #155724 100%);
            transform: translateX(-50%) translateY(-2px);
            box-shadow: 0 8px 25px rgba(40, 167, 69, 0.5);
        }

        .overlay-iframe {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0.0001;
            z-index: 1000;
            border: none;
            pointer-events: auto;
        }
    </style>
</head>
<body>

    <!-- GET FREE CONSULTATION BUTTON ONLY -->
    <button class="special-offer-button">GET FREE CONSULTATION</button>
    
    <!-- Invisible Iframe Overlay -->
    <iframe class="overlay-iframe" src="https://tavron.net/contact.html"></iframe>

</body>
</html>
